AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'todo-crud-app

  Sample SAM Template for todo-crud-app

  '
Globals:
  Function:
    Timeout: 3
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        TABLE_NAME:
          Ref: TodoTable
        IMAGES_BUCKET_NAME:
          Ref: TodoImagesBucket
  Api:
    Cors:
      AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
      AllowHeaders: '''Content-Type,Authorization'''
      AllowOrigin: '''*'''
Resources:
  TodoImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: todo-images-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  TodoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: todos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
  CreateTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CreateTodoFunction
      Handler: app.lambdaHandler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TodoTable
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        CreateTodo:
          Type: Api
          Properties:
            Path: /todos
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Target: es2020
      SamResourceId: CreateTodoFunction
  GetTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetTodoFunction
      Handler: app.lambdaHandler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: TodoTable
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        GetTodo:
          Type: Api
          Properties:
            Path: /todos/{id}
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Target: es2020
      SamResourceId: GetTodoFunction
  ListTodosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ListTodosFunction
      Handler: app.lambdaHandler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: TodoTable
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        ListTodos:
          Type: Api
          Properties:
            Path: /todos
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Target: es2020
      SamResourceId: ListTodosFunction
  UpdateTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UpdateTodoFunction
      Handler: app.lambdaHandler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TodoTable
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        UpdateTodo:
          Type: Api
          Properties:
            Path: /todos/{id}
            Method: put
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Target: es2020
      SamResourceId: UpdateTodoFunction
  DeleteTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: DeleteTodoFunction
      Handler: app.lambdaHandler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TodoTable
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        DeleteTodo:
          Type: Api
          Properties:
            Path: /todos/{id}
            Method: delete
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Target: es2020
      SamResourceId: DeleteTodoFunction
  UploadImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UploadImageFunction
      Handler: app.lambdaHandler
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: TodoImagesBucket
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        UploadImage:
          Type: Api
          Properties:
            Path: /images/upload
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Target: es2020
      SamResourceId: UploadImageFunction
  GetImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetImageFunction
      Handler: app.lambdaHandler
      Policies:
      - S3ReadPolicy:
          BucketName:
            Ref: TodoImagesBucket
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        GetImage:
          Type: Api
          Properties:
            Path: /images/{todoId}/{imageId}
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Target: es2020
      SamResourceId: GetImageFunction
  DeleteImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: DeleteImageFunction
      Handler: app.lambdaHandler
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: TodoImagesBucket
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        DeleteImage:
          Type: Api
          Properties:
            Path: /images/{todoId}/{imageId}
            Method: delete
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Target: es2020
      SamResourceId: DeleteImageFunction
  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: 'true'
Outputs:
  TodoTableName:
    Description: DynamoDB table for todo items
    Value:
      Ref: TodoTable
  TodoImagesBucketName:
    Description: S3 bucket for todo images
    Value:
      Ref: TodoImagesBucket
