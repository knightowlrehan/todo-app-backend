AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  todo-crud-app

  Sample SAM Template for todo-crud-app

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3

    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        TABLE_NAME: !Ref TodoTable
        IMAGES_BUCKET_NAME: !Ref TodoImagesBucket
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
Resources:
  #S3 Bucket for todo images
  TodoImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "todo-images-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  #Dynamodb table resource for todo items
  TodoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: todos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  #create todo
  CreateTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/create-todo/
      Handler: app.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TodoTable
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        CreateTodo:
          Type: Api
          Properties:
            Path: /todos
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - app.ts

  #get todo by id
  GetTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/get-todo/
      Handler: app.lambdaHandler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TodoTable
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        GetTodo:
          Type: Api
          Properties:
            Path: /todos/{id}
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - app.ts

  #list all todos
  ListTodosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/list-todos/
      Handler: app.lambdaHandler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TodoTable
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        ListTodos:
          Type: Api
          Properties:
            Path: /todos
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - app.ts

  #update todo by id
  UpdateTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/update-todo/
      Handler: app.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TodoTable
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        UpdateTodo:
          Type: Api
          Properties:
            Path: /todos/{id}
            Method: put
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - app.ts

  #delete todo by id
  DeleteTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/delete-todo/
      Handler: app.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TodoTable
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        DeleteTodo:
          Type: Api
          Properties:
            Path: /todos/{id}
            Method: delete
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - app.ts

  #upload image to S3
  UploadImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/upload-image/
      Handler: app.lambdaHandler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref TodoImagesBucket
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        UploadImage:
          Type: Api
          Properties:
            Path: /images/upload
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - app.ts

  #get image presigned URL
  GetImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/get-image/
      Handler: app.lambdaHandler
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref TodoImagesBucket
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        GetImage:
          Type: Api
          Properties:
            Path: /images/{todoId}/{imageId}
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - app.ts

  #delete image from S3
  DeleteImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/delete-image/
      Handler: app.lambdaHandler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref TodoImagesBucket
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        DeleteImage:
          Type: Api
          Properties:
            Path: /images/{todoId}/{imageId}
            Method: delete
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - app.ts

  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: "true"
Outputs:
  TodoTableName:
    Description: DynamoDB table for todo items
    Value: !Ref TodoTable
  TodoImagesBucketName:
    Description: S3 bucket for todo images
    Value: !Ref TodoImagesBucket
